---
name: Build game

on: [ push, pull_request ]

jobs:
  build-msvc:
    name: Windows installer ${{ matrix.installer_type }}
    runs-on: windows-2019
    env:
      BUILD_TOOLS_PATH: C:\apps\build-tools\
      CONAN_USER_HOME_SHORT: None
    strategy:
      matrix:
        installer_type: [Online, Offline]
    steps:
      - run: echo $env:BUILD_TOOLS_PATH | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install Build tools
        run: git clone https://git.anotherfoxguy.com/AnotherFoxGuy/build-tools.git %BUILD_TOOLS_PATH%
        shell: cmd

      - name: Cache conan packages
        uses: actions/cache@v3
        with:
          key: conan-windows-${{ hashFiles('conanfile.py') }}
          path: ~/.conan2

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.12.1

      - name: Configure
        run: |
          conan remote add ror-conan https://git.anotherfoxguy.com/api/packages/rorbot/conan -f
          conan install . -b missing -pr:b=tools/conan-profiles/vs-19-release-ninja -pr=tools/conan-profiles/vs-19-release-ninja
          cmake --preset conan-release -DCREATE_CONTENT_FOLDER=ON -DROR_BUILD_INSTALLER=${{ matrix.installer_type }}
        shell: cmd

      - name: Build
        run: ninja package
        shell: cmd

      - name: Upload redist folder
        uses: actions/upload-artifact@v3
        with:
          name: Installer-${{ matrix.installer_type }}
          path: |
            _CPack_Packages/win64/INNOSETUP/rigs-of-rods-*.exe
            CPackUploads/*

      - name: Clean Conan pkgs
        run: conan cache clean "*" -sbd
        shell: cmd
